version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pi_postgres
    environment:
      POSTGRES_DB: pi_platform
      POSTGRES_USER: pi_user
      POSTGRES_PASSWORD: pi_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pi_user -d pi_platform']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pi_backend
    ports:
      - '3001:3001'
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: pi_platform
      DATABASE_USER: pi_user
      DATABASE_PASSWORD: pi_password
      JWT_SECRET: pi_platform_super_secret_key_2024
      PORT: 3001
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pi_frontend
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  postgres_data:
